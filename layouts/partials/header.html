<!-- Modified from Dan Luu's original theme. See README.md or theme.toml -->

<!DOCTYPE HTML>
<html lang="en-US">
<head>
<title> {{ .Title }} </title>
<link href="https://fonts.googleapis.com/css?family=Neuton|Merriweather:300|Roboto+Mono" rel="stylesheet">
<style>
  /* ── Light mode (default) ── */
  :root {
    --bg:      #ffffff;
    --text:    #111111;
    --link:    #00007a;
    --border:  #cccccc;
    --surface: #f5f5f5;
  }

  /* ── Dark mode ── */
  html[data-theme="dark"] {
    --bg:      #08080f;
    --text:    #e4e4f0;
    --link:    #4da6ff;
    --border:  #252540;
    --surface: #10101c;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    transition: background 0.2s, color 0.2s;
  }

  a { color: var(--link); }

  .nav-button {
    display: inline;
    overflow-x: auto;
    font-size: 95%;
    font-family: 'Merriweather', serif;
  }
  p, .ul, .ol, .footnotes, li {
    max-width: 35em;
    font-size: 92%;
    line-height: 145%;
    font-family: 'Merriweather', serif;
  }
  h1, h2, h3, h4, h5, h6 {
    margin: 0px;
    font-family: 'Neuton', serif;
  }
  code {
    font-family: 'Roboto Mono';
  }

  /* ── Dark mode toggle button ── */
  #dark-toggle {
    position: fixed;
    top: 12px;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 4px 9px;
    cursor: pointer;
    border-radius: 3px;
    opacity: 0.6;
    transition: opacity 0.2s, background 0.2s, color 0.2s, border-color 0.2s;
    z-index: 9999;
  }
  #dark-toggle:hover { opacity: 1; }
</style>

<script>
  // Apply saved theme before paint to avoid flash
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>

</head>
<body>

<button id="dark-toggle" aria-label="Toggle dark mode">dark</button>

<script>
  (function() {
    var btn = document.getElementById('dark-toggle');
    function update() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? 'light' : 'dark';
    }
    update();
    btn.addEventListener('click', function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      update();
    });
  })();
</script>
